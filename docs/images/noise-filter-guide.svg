<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 850" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 타이틀 -->
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">노이즈 제거 콘덴서 배치도</text>
  <text x="500" y="48" text-anchor="middle" font-size="11" fill="#666">각 IC의 VDD-GND 사이에 최대한 가깝게 설치</text>

  <!-- 전원 계통 배경 -->
  <rect x="30" y="70" width="940" height="120" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="500" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">전원 계통</text>

  <!-- 12V DC -->
  <rect x="50" y="105" width="80" height="40" rx="5" fill="#333" stroke="#111" stroke-width="1.5"/>
  <text x="90" y="130" text-anchor="middle" font-size="11" fill="white" font-weight="bold">12V DC</text>

  <!-- Buck 5V -->
  <rect x="220" y="105" width="100" height="40" rx="5" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
  <text x="270" y="130" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Buck 12V→5V</text>
  <path d="M130,125 L218,125" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Buck 6V -->
  <rect x="220" y="155" width="100" height="40" rx="5" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
  <text x="270" y="175" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Buck 12V→6V</text>
  <path d="M130,135 L150,135 L150,175 L218,175" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- 5V Rail -->
  <path d="M320,125 L900,125" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.5"/>
  <text x="340" y="118" font-size="9" fill="#2E7D32" font-weight="bold">5V Rail</text>

  <!-- 6V Rail -->
  <path d="M320,175 L600,175" fill="none" stroke="#FF9800" stroke-width="3" opacity="0.5"/>
  <text x="340" y="168" font-size="9" fill="#E65100" font-weight="bold">6V Rail</text>

  <!-- ===== IC 블록들 ===== -->

  <!-- Arduino Nano -->
  <rect x="400" y="230" width="120" height="70" rx="6" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="460" y="260" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Arduino Nano</text>
  <text x="460" y="278" text-anchor="middle" font-size="9" fill="#BBDEFB">ATmega328P</text>
  <path d="M460,125 L460,228" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- C1: Arduino 5V-GND -->
  <g filter="url(#glow)">
    <rect x="520" y="240" width="55" height="30" rx="4" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
    <text x="547" y="253" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C1</text>
    <text x="547" y="265" text-anchor="middle" font-size="7" fill="#333">100nF</text>
  </g>
  <text x="585" y="255" font-size="8" fill="#D32F2F" font-weight="bold">← 5V-GND</text>

  <!-- ADS1115 -->
  <rect x="650" y="230" width="120" height="70" rx="6" fill="#2196F3" stroke="#1565C0" stroke-width="1.5"/>
  <text x="710" y="260" text-anchor="middle" font-size="12" fill="white" font-weight="bold">ADS1115</text>
  <text x="710" y="278" text-anchor="middle" font-size="9" fill="#BBDEFB">16-bit ADC</text>
  <path d="M710,125 L710,228" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- C2: ADS1115 100nF -->
  <g filter="url(#glow)">
    <rect x="770" y="230" width="55" height="30" rx="4" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
    <text x="797" y="243" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C2</text>
    <text x="797" y="255" text-anchor="middle" font-size="7" fill="#333">100nF</text>
  </g>

  <!-- C3: ADS1115 10μF -->
  <g filter="url(#glow)">
    <rect x="770" y="265" width="55" height="30" rx="4" fill="#FF8A65" stroke="#E64A19" stroke-width="2"/>
    <text x="797" y="278" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C3</text>
    <text x="797" y="290" text-anchor="middle" font-size="7" fill="#333">10μF</text>
  </g>
  <text x="835" y="268" font-size="8" fill="#D32F2F" font-weight="bold">← VDD-GND</text>
  <text x="835" y="285" font-size="8" fill="#D32F2F" font-weight="bold">  병렬</text>

  <!-- DS18B20 -->
  <rect x="400" y="370" width="120" height="60" rx="6" fill="#E65100" stroke="#BF360C" stroke-width="1.5"/>
  <text x="460" y="398" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DS18B20</text>
  <text x="460" y="415" text-anchor="middle" font-size="9" fill="#FFE0B2">온도 센서</text>
  <path d="M460,300 L460,368" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- C4: DS18B20 VCC-GND -->
  <g filter="url(#glow)">
    <rect x="520" y="380" width="55" height="30" rx="4" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
    <text x="547" y="393" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C4</text>
    <text x="547" y="405" text-anchor="middle" font-size="7" fill="#333">100nF</text>
  </g>
  <text x="585" y="395" font-size="8" fill="#D32F2F" font-weight="bold">← VCC-GND</text>

  <!-- pH Signal Board -->
  <rect x="650" y="370" width="120" height="60" rx="6" fill="#D32F2F" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="710" y="393" text-anchor="middle" font-size="11" fill="white" font-weight="bold">pH 시그널보드</text>
  <text x="710" y="410" text-anchor="middle" font-size="9" fill="#FFCDD2">SEN0161-V2</text>
  <path d="M710,300 L710,368" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- pH → ADS1115 연결 -->
  <path d="M710,370 L710,340 Q710,330 720,330 L750,330 Q760,330 760,310 L720,310 L720,300" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <text x="740" y="345" font-size="7" fill="#546E7A">아날로그 출력</text>

  <!-- L298N1/2 (12V) -->
  <rect x="50" y="370" width="110" height="60" rx="6" fill="#F44336" stroke="#C62828" stroke-width="1.5"/>
  <text x="105" y="393" text-anchor="middle" font-size="11" fill="white" font-weight="bold">L298N1/N2</text>
  <text x="105" y="410" text-anchor="middle" font-size="9" fill="#FFCDD2">펌프 모터 (12V)</text>
  <path d="M90,145 L90,175 L90,370" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- L298N3 (6V) -->
  <rect x="200" y="370" width="110" height="60" rx="6" fill="#F44336" stroke="#C62828" stroke-width="1.5"/>
  <text x="255" y="393" text-anchor="middle" font-size="11" fill="white" font-weight="bold">L298N3</text>
  <text x="255" y="410" text-anchor="middle" font-size="9" fill="#FFCDD2">솔레노이드 (6V)</text>
  <path d="M255,195 L255,370" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 노이즈 경로 표시 -->
  <path d="M160,400 Q200,450 350,450 Q420,450 450,430" fill="none" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="280" y="465" text-anchor="middle" font-size="8" fill="#D32F2F" opacity="0.6">모터/솔레노이드 스위칭 노이즈 경로</text>

  <!-- ===== 범례 ===== -->
  <rect x="50" y="520" width="900" height="310" rx="8" fill="#FAFAFA" stroke="#CCC" stroke-width="1"/>
  <text x="500" y="545" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">콘덴서 배치 가이드</text>

  <!-- 범례 테이블 -->
  <rect x="80" y="560" width="840" height="25" rx="3" fill="#ECEFF1"/>
  <text x="120" y="577" font-size="10" fill="#333" font-weight="bold">번호</text>
  <text x="200" y="577" font-size="10" fill="#333" font-weight="bold">부품</text>
  <text x="350" y="577" font-size="10" fill="#333" font-weight="bold">위치</text>
  <text x="570" y="577" font-size="10" fill="#333" font-weight="bold">역할</text>
  <text x="830" y="577" font-size="10" fill="#333" font-weight="bold">필수</text>

  <line x1="80" y1="588" x2="920" y2="588" stroke="#CCC" stroke-width="0.5"/>

  <!-- C1 -->
  <rect x="100" y="595" width="30" height="16" rx="3" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <text x="115" y="607" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C1</text>
  <text x="200" y="607" font-size="10" fill="#333">100nF 세라믹</text>
  <text x="350" y="607" font-size="10" fill="#333">Arduino Nano 5V — GND</text>
  <text x="570" y="607" font-size="10" fill="#333">MCU 고주파 스위칭 노이즈 제거</text>
  <text x="840" y="607" font-size="10" fill="#2E7D32" font-weight="bold">필수</text>

  <line x1="80" y1="618" x2="920" y2="618" stroke="#EEE" stroke-width="0.5"/>

  <!-- C2 -->
  <rect x="100" y="625" width="30" height="16" rx="3" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <text x="115" y="637" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C2</text>
  <text x="200" y="637" font-size="10" fill="#333">100nF 세라믹</text>
  <text x="350" y="637" font-size="10" fill="#333">ADS1115 VDD — GND</text>
  <text x="570" y="637" font-size="10" fill="#333">ADC 전원 고주파 노이즈 제거</text>
  <text x="840" y="637" font-size="10" fill="#D32F2F" font-weight="bold">필수</text>

  <line x1="80" y1="648" x2="920" y2="648" stroke="#EEE" stroke-width="0.5"/>

  <!-- C3 -->
  <rect x="100" y="655" width="30" height="16" rx="3" fill="#FF8A65" stroke="#E64A19" stroke-width="1"/>
  <text x="115" y="667" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C3</text>
  <text x="200" y="667" font-size="10" fill="#333">10μF 전해</text>
  <text x="350" y="667" font-size="10" fill="#333">ADS1115 VDD — GND (C2와 병렬)</text>
  <text x="570" y="667" font-size="10" fill="#333">ADC 전원 저주파 리플 안정화 (TI 권장)</text>
  <text x="840" y="667" font-size="10" fill="#D32F2F" font-weight="bold">필수</text>

  <line x1="80" y1="678" x2="920" y2="678" stroke="#EEE" stroke-width="0.5"/>

  <!-- C4 -->
  <rect x="100" y="685" width="30" height="16" rx="3" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <text x="115" y="697" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">C4</text>
  <text x="200" y="697" font-size="10" fill="#333">100nF 세라믹</text>
  <text x="350" y="697" font-size="10" fill="#333">DS18B20 VCC — GND</text>
  <text x="570" y="697" font-size="10" fill="#333">온도 센서 전원 안정화</text>
  <text x="840" y="697" font-size="10" fill="#2E7D32" font-weight="bold">권장</text>

  <line x1="80" y1="718" x2="920" y2="718" stroke="#CCC" stroke-width="0.5"/>

  <!-- 설치 원칙 -->
  <text x="100" y="740" font-size="11" fill="#333" font-weight="bold">설치 원칙</text>
  <text x="100" y="758" font-size="10" fill="#555">1. 각 IC의 VDD-GND 핀에 최대한 가깝게 (리드선 최소화)</text>
  <text x="100" y="775" font-size="10" fill="#555">2. 세라믹(100nF)은 고주파, 전해(10μF)는 저주파 노이즈 제거 → 병렬 사용이 효과적</text>
  <text x="100" y="792" font-size="10" fill="#555">3. pH 측정 중에는 모터/솔레노이드를 정지해야 최고 정밀도 확보 (시퀀스 자동 보장)</text>
  <text x="100" y="809" font-size="10" fill="#D32F2F" font-weight="bold">4. Buck 컨버터 출력 → IC 전원 경로에 배치해야 스위칭 노이즈 차단 효과 극대화</text>
</svg>
